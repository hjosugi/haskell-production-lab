name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix="haskell-production-lab-${GITHUB_REF_NAME}/" --output="haskell-production-lab-${GITHUB_REF_NAME}.tar.gz" HEAD
          git archive --format=zip --prefix="haskell-production-lab-${GITHUB_REF_NAME}/" --output="haskell-production-lab-${GITHUB_REF_NAME}.zip" HEAD

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "haskell-production-lab-${GITHUB_REF_NAME}.tar.gz" "haskell-production-lab-${GITHUB_REF_NAME}.zip" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "haskell-production-lab-${GITHUB_REF_NAME}.tar.gz" \
              "haskell-production-lab-${GITHUB_REF_NAME}.zip" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file docs/RELEASE_NOTES_v0.1.0.md
          fi
