name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workers:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/humblr-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/humblr-workers/package-lock.json

      - run: npm ci
      - run: CI=true npm run d1:migrate
      - run: npm run check

  cabal:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hps
          POSTGRES_USER: hps
          POSTGRES_PASSWORD: hps
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hps -d hps"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client library
        run: sudo apt-get update && sudo apt-get install -y libpq-dev pkg-config

      - name: Install Haskell toolchain
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.4"
          cabal-version: "3.12.1.0"

      - name: Build
        run: |
          cabal update
          cabal build all
      - name: Test
        env:
          HPS_TEST_DATABASE_URL: postgresql://hps:hps@localhost:5432/hps
        run: cabal test all
