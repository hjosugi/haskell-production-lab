services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hps
      POSTGRES_USER: hps
      POSTGRES_PASSWORD: hps
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hps -d hps"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      PORT: 8080
      APP_ENV: development
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

  websocket:
    build: .
    command: ["hps-websocket"]
    environment:
      PORT: 8081
    ports:
      - "8081:8081"

volumes:
  postgres-data:
